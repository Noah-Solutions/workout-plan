<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1320" />
  <meta name="description" content="Flexible concurrent training tracker: lifting, Zone 2, intervals, with auto-progression." />
  <title>Concurrent Trainer</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="app-header__inner">
        <h1 id="viewTitle">This Week</h1>
        <div class="app-header__meta" id="weekLabel"></div>
      </div>
    </header>

    <main id="view" class="view"></main>

    <nav class="tabbar" role="navigation" aria-label="Main">
      <button class="tab is-active" data-tab="week" aria-label="Week">
        <span class="tab__icon">◎</span><span class="tab__label">Week</span>
      </button>
      <button class="tab" data-tab="log" aria-label="Log">
        <span class="tab__icon">＋</span><span class="tab__label">Log</span>
      </button>
      <button class="tab" data-tab="history" aria-label="History">
        <span class="tab__icon">≡</span><span class="tab__label">History</span>
      </button>
      <button class="tab" data-tab="setup" aria-label="Setup">
        <span class="tab__icon">⚙</span><span class="tab__label">Setup</span>
      </button>
    </nav>
  </div>

  <!-- Modal host -->
  <div id="modalRoot"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
