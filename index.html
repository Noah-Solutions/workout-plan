<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1320" />
  <meta name="description" content="Flexible concurrent training tracker: lifting, Zone 2, intervals, with auto-progression." />
  <title>Concurrent Trainer</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="app-header__inner">
        <h1 id="viewTitle">Today</h1>
        <div class="app-header__right">
          <div class="app-header__meta" id="weekLabel"></div>
          <button class="iconbtn" id="setupBtn" aria-label="Setup">⚙</button>
        </div>
      </div>
    </header>

    <main id="view" class="view"></main>

    <nav class="tabbar" role="navigation" aria-label="Main">
      <button class="tab is-active" data-tab="today" aria-label="Today">
        <span class="tab__icon">◎</span><span class="tab__label">Today</span>
      </button>
      <button class="tab" data-tab="plan" aria-label="Plan">
        <span class="tab__icon">▤</span><span class="tab__label">Plan</span>
      </button>
      <button class="tab tab--log" id="logBtn" aria-label="Log">
        <span class="tab__plus">＋</span>
      </button>
      <button class="tab" data-tab="progress" aria-label="Progress">
        <span class="tab__icon">◔</span><span class="tab__label">Progress</span>
      </button>
      <button class="tab" data-tab="history" aria-label="History">
        <span class="tab__icon">≡</span><span class="tab__label">History</span>
      </button>
    </nav>
  </div>

  <!-- Rest timer bar (managed by timer.js, sits above the tab bar) -->
  <div id="restBar" class="restbar restbar--hidden"></div>

  <!-- Modal host -->
  <div id="modalRoot"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
