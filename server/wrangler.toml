# Cloudflare Worker config for the Concurrent Trainer sync backend.
# See server/README.md for the full deploy walkthrough.
name = "trainer-sync"
main = "worker.js"
compatibility_date = "2024-11-01"

# KV namespace for storage. Create it with:
#   wrangler kv namespace create TRAINER_KV
# then paste the returned id below (replace REPLACE_WITH_YOUR_KV_ID).
[[kv_namespaces]]
binding = "TRAINER_KV"
id = "c18e45950644416a84c1a41aa7809828"

# SYNC_TOKEN is NOT stored here — it's a secret set with:
#   wrangler secret put SYNC_TOKEN

# CORS allowlist (defense-in-depth on top of the token). Optional: the worker
# already defaults to your GitHub Pages origin + localhost. Uncomment and edit
# to override (comma-separated) if you serve the app from a different origin.
# [vars]
# ALLOWED_ORIGINS = "https://noah-solutions.github.io,http://localhost:8000"
